        body {
            background-color: #ccab34;
        }

        #game-area {
            display: flex;
            gap: 15px;
        }

        .panel {
            flex: 1;
            background-color: rgb(255, 220, 133);
            border: 5px double rgb(216, 173, 53);
            border-radius: 6px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
        }

        .sim {
            flex: 1;
            background-color: rgb(205, 175, 101);
            ;

            border-radius: 6px;
            padding: 15px;

            display: flex;

            overflow-y: auto;
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
align-items: center;
            justify-content: center;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
        }

        .stat {
            background-color: #7c4803;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat_name {
            font-size: 20px;
        }

        .stat_number {
            color: rgb(201, 119, 11);
            padding-left: 5px;
            font-size: 30px;
        }

        .store {
            background-color: #7c4803;
            border-radius: 10px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .store_button {
            font-size: 20px;
            margin: 10px;
            width: 400px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
