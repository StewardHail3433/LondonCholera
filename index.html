        body {

        #game-area {
            display: flex;
            gap: 15px;
        }

        .panel {
            flex: 1;
            background-color: rgb(255, 220, 133);
            border: 5px double rgb(216, 173, 53);
            border-radius: 6px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
        }

        .sim {

            margin: 3px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
        }

        .stat {
            background-color: #7c4803;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat_name {

        }

        .stat_number {
            color: rgb(201, 119, 11);
            padding-left: 5px;
            font-size: 30px;
        }

        .store {
            background-color: #7c4803;
            border-radius: 10px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px 0;
        }

        .store_button {
            font-size: 20px;
            margin: 0 10px;
            width: auto;
            align-self: stretch;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            aspect-ratio: 1 / 1;
            width: 100%;
        }

        button {
            background-color: rgb(215, 220, 220);
        }
    </style>
</head>

    <script>
        let selectedType = "";
        let money = 1000
        let typePrices = [
            ["house", 150],
            ["pump", 75],
            ["air", 150]
        ]
        let houseTiles = [];
        let pumpTiles = [];
        let factoryTiles = [];
let years = [{year: 1813, text: "primary source", credits: "thanks to primary source"}];
let currentYear = 0;
        
        function buy(type) {
            
            if(selectedType == type) {
                selectedType = "";
            } else {
                selectedType = type;
            }

            alert(type);
        }
function updateMoney() {
     document.getElementById("stat_money").innerHTML = "$" + money;
}
        function tileClicked(x, y, button) {
            alert(x + ", " + y);
            if(selectedType != "") {
                if(houseTiles.find(pt => pt[0] == x && pt[y] == y ) || factoryTiles.find(pt => pt[0] == x && pt[y] == y ) || pumpTiles.find(pt => pt[0] == x && pt[y] == y )) {
                    alert("Tile is in use");
                } else {
                    switch (selectedType) {
                        case "house":
                            if(money >= typePrices[0][1]) {
                                money -= typePrices[0][1];
                                houseTiles.push([x, y]);
                                button.innerHTML = "🏠";
updateMoney();
                            } else {
                                alert("You dont got the funds");
                            }
                            break;
                        case "pump":
                            if(money >= typePrices[1][1]) {
                                money -= typePrices[1][1];
                                pumpTiles.push([x, y]);
                                button.innerHTML = "🚰";
updateMoney();
                            } else {
                                alert("You dont got the funds");
                            }
                            break;
                        case "air":
                            if(money >= typePrices[2][1]) {
                                money -= typePrices[2][1];
updateMoney();
                            } else {
                                alert("You dont got the funds");
                            }
                            break;
                    
                        default:
                            break;
                    }
                }
            }
        }
        function progressYear() {
             for(let i = 0; i < years.length - 1; i++) {
if(years[i].year == currentYear) {
currentYear = currentYear++;
document.getElementById("stat-year").innerHTML = currentYear;
}
        }
updateMoney();
    </script>
